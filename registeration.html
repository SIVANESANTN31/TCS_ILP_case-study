<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Registration</title>
  <link rel="stylesheet" href="./style.css">
  <script src="script.js"></script>
</head>

<body class="register-page">
  <div class="top-nav">
    <button onclick="goToLogin()">Login</button>
  </div>
  <div class="container" id="formContainer">
    <h2>Customer Registration</h2>
    <label>Customer Name</label>
    <input type="text" id="name" maxlength="50">
    <div class="error" id="nameError"></div>
    <label>Email</label>
    <input type="text" id="email">
    <div class="error" id="emailError"></div>
    <label>Mobile Number</label>
    <div class="mobile-group">
      <select id="countryCode">
        <option value="">Select Code</option>
        <option value="+91">+91</option>
        <option value="+1">+1</option>
        <option value="+44">+44</option>
      </select>
      <input type="text" id="mobile" maxlength="10">
    </div>
    <div class="error" id="mobileError"></div>
    <label>Address</label>
    <textarea id="address"></textarea>
    <div class="error" id="addressError"></div>
    <h3>Username & Password</h3>
    <label>Customer ID</label>
    <input type="text" id="customerId">
    <div class="error" id="customerIdError"></div>
    <label>Password</label>
    <input type="password" id="password">
    <div class="error" id="passwordError"></div>
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword">
    <div class="error" id="confirmPasswordError"></div>
    <div class="buttons">
      <button class="register" onclick="register()">Register</button>
      <button class="reset" onclick="resetForm()">Reset</button>
    </div>
  </div>
  <div class="container success-screen" id="successScreen">
    <h2>Registration Successful</h2>
    <p class="success-message">✅ Consumer Registration successful.</p>
    <p>Your User ID: <strong id="userId"></strong></p>
  </div>
</body>

</html>
